<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Login / Signup - JobHunt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">JobHunt</a>
    </nav>

    <div class="container" style="max-width: 400px;">
        <div class="card">
            <h2 id="form-title" style="text-align:center; margin-bottom:1rem;">Login</h2>
            
            <form id="auth-form">
                <!-- Name only visible for Signup -->
                <div class="form-group" id="name-group" style="display:none;">
                    <label>Full Name</label>
                    <input type="text" id="fullname">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn-primary" style="width:100%">Submit</button>
            </form>

            <p style="margin-top:1rem; text-align:center;">
                <span id="toggle-text">New user? </span>
                <a href="#" id="toggle-auth" style="color:var(--primary);">Create an account</a>
            </p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
