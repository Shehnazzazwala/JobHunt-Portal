<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Profile</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav class="navbar"></nav>
    <script type="module">
        import { loadCompanyNavbar } from "./js/navbar.js";
        loadCompanyNavbar();
    </script>

    <div class="container">
        <!-- View Mode -->
        <div id="view-mode" class="card fade-in">
            <div
                style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--glass-border); padding-bottom:1.5rem; margin-bottom:1.5rem;">
                <div>
                    <h2 id="view-fullname" style="font-size: 2rem; margin-bottom: 0.5rem;">Loading...</h2>
                    <p id="view-title" style="font-size: 1.2rem; color: var(--primary); font-weight: 500;">...</p>
                    <div style="margin-top: 1rem; color: var(--text-light);">
                        <p><i class="fas fa-envelope"></i> <span id="view-email">...</span></p>
                        <p><i class="fas fa-map-marker-alt"></i> <span id="view-location">...</span></p>
                    </div>
                </div>
                <a href="company-applications.html" class="btn-secondary">Back to Applications</a>
            </div>

            <div class="profile-section" style="margin-bottom: 2rem;">
                <h3 class="section-header">About Me</h3>
                <p id="view-aboutme" style="white-space: pre-line; line-height: 1.6;">...</p>
            </div>

            <div class="profile-section" style="margin-bottom: 2rem;">
                <h3 class="section-header">
                    Professional Experience <span id="view-total-exp" class="match-badge"
                        style="font-size: 0.85rem; margin-left: 10px;">(Total: 0 Yrs)</span></h3>
                <div id="view-experience-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Experience entries injected here -->
                    <p style="color: var(--text-light); font-style: italic;">No experience listed.</p>
                </div>
            </div>

            <div class="profile-section" style="margin-bottom: 2rem;">
                <h3 class="section-header">Education</h3>
                <div id="view-education-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Education entries injected here -->
                    <p style="color: var(--text-light); font-style: italic;">No education listed.</p>
                </div>
            </div>

            <div class="profile-section" style="margin-bottom: 2rem;">
                <h3 class="section-header">Certifications & Achievements</h3>
                <p id="view-certs" style="white-space: pre-line; line-height: 1.6;">...</p>
            </div>

            <div class="profile-section">
                <h3 class="section-header">Projects</h3>
                <div id="view-projects-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <p style="color: var(--text-light); font-style: italic;">No projects listed.</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/applicant-profile.js"></script>
</body>

</html>
