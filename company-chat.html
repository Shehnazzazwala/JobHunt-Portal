<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Chat with Applicant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <nav class="navbar"></nav>
    <script type="module">
        import { loadCompanyNavbar } from "./js/navbar.js";
        loadCompanyNavbar();
    </script>

    <div class="container" style="max-width: 780px;">
        <div class="card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 80vh;">

            <!-- Chat Header -->
            <div class="chat-header">
                <a href="company-applications.html" class="chat-back"><i class="fas fa-arrow-left"></i></a>
                <div class="chat-header-info">
                    <div class="chat-avatar"><i class="fas fa-user"></i></div>
                    <div>
                        <div id="chat-name" class="chat-name">Loading...</div>
                        <div class="chat-subtitle">Applicant</div>
                    </div>
                </div>
            </div>

            <!-- Messages -->
            <div id="chat-messages" class="chat-messages">
                <div class="chat-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading messages...</div>
            </div>

            <!-- Input -->
            <div class="chat-input-bar">
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button id="chat-send" class="chat-send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script type="module" src="js/company-chat.js"></script>
</body>

</html>
