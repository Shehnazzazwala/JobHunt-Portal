<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Admin Portal - JobHunt</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar" style="background: #1f2937; color: white;">
        <a href="index.html" class="logo" style="color:white;">JobHunt <span style="color:#9ca3af; font-size:0.8rem;">ADMIN</span></a>
    </nav>
    <div class="container" style="max-width: 400px; margin-top:50px;">
        <div class="card">
            <h2 id="form-title" style="text-align:center; margin-bottom:1rem;">Admin Login</h2>
            <form id="admin-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%; background:#1f2937;">Enter Panel</button>
            </form>

        </div>
    </div>
    <script type="module" src="js/admin-auth.js"></script>
</body>

</html>
