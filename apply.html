<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar"><a href="index.html" class="logo">JobHunt</a></nav>

    <div class="container" style="max-width: 500px;">
        <div class="card">
            <h2>Job Application</h2>
            <p id="job-title-display" style="color:var(--primary); font-weight:bold; margin-bottom:1rem;"></p>

            <form id="application-form">
                <div class="form-group">
                    <label>Applicant Email</label>
                    <input type="email" id="app-email" required>
                </div>
                <div class="form-group">
                    <label>Years of Experience</label>
                    <input type="number" id="app-exp" required placeholder="e.g. 3">
                </div>
                <div class="form-group">
                    <label>Resume Link (Google Drive / Dropbox)</label>
                    <input type="url" id="app-resume-link" required placeholder="Paste shareable link here...">
                    <small style="color:#666; font-size:0.8rem;">*Ensure link is accessible to anyone.</small>
                </div>
                <button type="submit" class="btn-primary" id="submit-btn" style="width:100%">Submit Application</button>
            </form>
            <p id="status-msg" style="text-align:center; margin-top:10px;"></p>
        </div>
    </div>

    <script type="module" src="js/apply.js"></script>
</body>

</html>
